name: Search API Pipeline

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install requests beautifulsoup4 internetarchive PyYAML msgspec

      - name: Fetch pinned SearXNG source
        run: |
          rm -rf searxng
          mkdir searxng
          cd searxng
          git init
          git remote add origin https://github.com/searxng/searxng.git
          git fetch --depth 1 origin 7ac4ff39fee4cdde223dbab6a83af9c26b56366e
          git checkout FETCH_HEAD

      - name: Install SearXNG runtime requirements
        run: |
          if [ ! -f searxng/requirements.txt ]; then
            echo "ERROR: searxng/requirements.txt not found"
            find searxng -maxdepth 2 -type f | sort
            exit 1
          fi
          python -m pip install -r searxng/requirements.txt

      - name: Create SearXNG settings
        run: |
          mkdir -p ~/.config/searxng
          cat > ~/.config/searxng/settings.yml << 'YAML'
          use_default_settings: true

          search:
            formats:
              - html
              - json

          server:
            secret_key: "scrapebin-github-actions-key"
            bind_address: "127.0.0.1"
            port: 8080

          limiter: false
          YAML

      - name: Start local SearXNG
        run: |
          cd searxng
          export SEARXNG_SETTINGS_PATH="$HOME/.config/searxng/settings.yml"
          nohup python -m searx.webapp > /tmp/searxng.log 2>&1 &
          echo $! > /tmp/searxng.pid

          READY=0
          echo "Waiting for SearXNG..."
          for i in $(seq 1 90); do
            if curl -fsS "http://127.0.0.1:8080/search?q=test&format=json" > /dev/null; then
              echo "SearXNG is ready"
              READY=1
              break
            fi
            sleep 2
          done

          if [ "$READY" -ne 1 ]; then
            echo "Local SearXNG failed to start"
            echo "----- searxng log -----"
            cat /tmp/searxng.log || true
          fi

      - name: Run scraper, update README, upload to IA
        shell: python
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          import os
          import json
          import re
          import sys
          import time
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime, timezone
          from internetarchive import get_session

          IA_ACCESS = os.environ.get("IA_ACCESS_KEY")
          IA_SECRET = os.environ.get("IA_SECRET_KEY")

          if not IA_ACCESS or not IA_SECRET:
              print("ERROR: IA_ACCESS_KEY or IA_SECRET_KEY is missing.")
              sys.exit(1)

          QUERIES_FILE = "queries.txt"
          RESULTS_FILE = "results.jsonl"
          METADATA_FILE = "metadata.json"
          README_FILE = "README.md"

          LOCAL_SEARXNG_URL = "http://127.0.0.1:8080/search"
          PUBLIC_INSTANCES = [
              "https://searx.be",
              "https://search.ononoki.org",
              "https://priv.au",
              "https://paulgo.io"
          ]

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
          }

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def format_size(size_bytes):
              for unit in ["B", "KB", "MB", "GB", "TB"]:
                  if size_bytes < 1024.0 or unit == "TB":
                      return f"{round(size_bytes, 2)} {unit}"
                  size_bytes /= 1024.0

          def ensure_file(path, default_text=""):
              if not os.path.exists(path):
                  with open(path, "w", encoding="utf-8") as f:
                      f.write(default_text)

          def search_local_json(query):
              res = requests.get(
                  LOCAL_SEARXNG_URL,
                  params={"q": query, "format": "json"},
                  timeout=30
              )
              res.raise_for_status()
              data = res.json()
              results = []
              for r in data.get("results", []):
                  results.append({
                      "query": query,
                      "date": now_iso(),
                      "search_provider": r.get("engine", "unknown"),
                      "title": r.get("title", ""),
                      "url": r.get("url", ""),
                      "snippet": r.get("content", ""),
                      "instance": "http://127.0.0.1:8080",
                      "mode": "local-json"
                  })
              return results

          def search_public_html(query):
              for instance in PUBLIC_INSTANCES:
                  try:
                      res = requests.get(
                          instance + "/search",
                          params={"q": query},
                          headers=HEADERS,
                          timeout=20
                      )
                      if res.status_code != 200:
                          continue

                      soup = BeautifulSoup(res.text, "html.parser")
                      articles = soup.find_all("article", class_="result")
                      parsed = []

                      for art in articles:
                          h3 = art.find("h3")
                          if not h3:
                              continue
                          a_tag = h3.find("a")
                          if not a_tag:
                              continue

                          content_tag = art.find("p", class_="content")
                          engines_tag = art.find(class_="engines")

                          parsed.append({
                              "query": query,
                              "date": now_iso(),
                              "search_provider": engines_tag.get_text(strip=True) if engines_tag else "unknown",
                              "title": a_tag.get_text(strip=True),
                              "url": a_tag.get("href"),
                              "snippet": content_tag.get_text(strip=True) if content_tag else "",
                              "instance": instance,
                              "mode": "public-html"
                          })

                      if parsed:
                          return parsed

                  except Exception:
                      continue

              return []

          # Ensure base files
          ensure_file(QUERIES_FILE, "open source\npython\n")
          ensure_file(README_FILE, "# Search API\n\n")
          ensure_file(RESULTS_FILE, "")

          # Load queries
          with open(QUERIES_FILE, "r", encoding="utf-8") as f:
              queries = [line.strip() for line in f if line.strip()]

          total_new_results = 0

          with open(RESULTS_FILE, "a", encoding="utf-8") as outfile:
              for query in queries:
                  results = []

                  # Try local SearXNG first
                  try:
                      results = search_local_json(query)
                      if results:
                          print(f"Local SearXNG worked for '{query}' with {len(results)} results")
                  except Exception as e:
                      print(f"Local SearXNG failed for '{query}': {e}")

                  # Fallback to public instances
                  if not results:
                      results = search_public_html(query)
                      if results:
                          print(f"Fallback public HTML worked for '{query}' with {len(results)} results")
                      else:
                          print(f"No results for '{query}' from either local or fallback")

                  for item in results:
                      outfile.write(json.dumps(item, ensure_ascii=False) + "\n")
                      total_new_results += 1

                  time.sleep(2)

          whole_size = os.path.getsize(RESULTS_FILE)
          with open(RESULTS_FILE, "r", encoding="utf-8") as f:
              total_results = sum(1 for _ in f)

          metadata = {
              "last_updated": now_iso(),
              "number_of_results": total_results,
              "whole_size_bytes": whole_size
          }

          with open(METADATA_FILE, "w", encoding="utf-8") as f:
              json.dump(metadata, f, indent=2)

          with open(README_FILE, "r", encoding="utf-8") as f:
              text = f.read()

          updates = [
              ("Number of Results:", str(total_results)),
              ("Time when updated:", metadata["last_updated"]),
              ("Whole size:", format_size(whole_size))
          ]

          for label, value in updates:
              pattern = r"^" + re.escape(label) + r".*$"
              replacement = f"{label} {value}"
              if re.search(pattern, text, flags=re.MULTILINE):
                  text = re.sub(pattern, replacement, text, flags=re.MULTILINE)
              else:
                  text = text.rstrip() + "\n" + replacement

          with open(README_FILE, "w", encoding="utf-8") as f:
              f.write(text + "\n")

          config = {
              "s3": {
                  "access": IA_ACCESS,
                  "secret": IA_SECRET
              }
          }

          session = get_session(config)
          item = session.get_item("ScrapeBin-Search")

          print("Uploading to Internet Archive...")
          item.upload(
              [RESULTS_FILE, METADATA_FILE],
              metadata={
                  "title": "ScrapeBin Search API",
                  "mediatype": "data"
              }
          )
          print("Upload successful.")

      - name: Commit and push README changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update README stats automatically"
          git push

      - name: Show SearXNG log on failure
        if: failure()
        run: |
          echo "----- searxng log -----"
          cat /tmp/searxng.log || true

      - name: Cleanup
        if: always()
        run: |
          kill $(cat /tmp/searxng.pid) 2>/dev/null || true
          rm -f /tmp/searxng.pid /tmp/searxng.log results.jsonl metadata.json
          rm -rf searxng
