name: Search API Pipeline

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 internetarchive

      - name: Run Scraper, Update, and Upload
        shell: python
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          import os, json, time, requests, re, sys
          from bs4 import BeautifulSoup
          from datetime import datetime, timezone
          from internetarchive import get_session

          ia_access = os.environ.get("IA_ACCESS_KEY")
          ia_secret = os.environ.get("IA_SECRET_KEY")
          if not ia_access or not ia_secret:
              print("ERROR: IA_ACCESS_KEY or IA_SECRET_KEY is missing!")
              sys.exit(1)

          QUERIES_FILE = "queries.txt"
          RESULTS_FILE = "results.jsonl"
          METADATA_FILE = "metadata.json"
          README_FILE = "README.md"

          INSTANCES = [
              "https://searx.be",
              "https://searxng.site",
              "https://search.ononoki.org",
              "https://priv.au",
              "https://paulgo.io"
          ]

          HEADERS = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

          if not os.path.exists(QUERIES_FILE):
              with open(QUERIES_FILE, "w") as f:
                  f.write("open source\npython\n")
          if not os.path.exists(README_FILE):
              with open(README_FILE, "w") as f:
                  f.write("# Search API\n\n")
          if not os.path.exists(RESULTS_FILE):
              open(RESULTS_FILE, "w").close()

          with open(QUERIES_FILE, "r") as f:
              queries = [line.strip() for line in f if line.strip()]

          total_new_results = 0
          with open(RESULTS_FILE, "a", encoding="utf-8") as outfile:
              for query in queries:
                  for instance in INSTANCES:
                      try:
                          res = requests.get(
                              instance + "/search",
                              params={"q": query},
                              headers=HEADERS,
                              timeout=15
                          )
                          if res.status_code == 200:
                              soup = BeautifulSoup(res.text, "html.parser")
                              articles = soup.find_all("article", class_="result")
                              for art in articles:
                                  h3 = art.find("h3")
                                  if not h3 or not h3.find("a"):
                                      continue
                                  a_tag = h3.find("a")
                                  content_tag = art.find("p", class_="content")
                                  engines_tag = art.find(class_="engines")
                                  item = {
                                      "query": query,
                                      "date": datetime.now(timezone.utc).isoformat(),
                                      "search_provider": engines_tag.get_text(strip=True) if engines_tag else "unknown",
                                      "title": a_tag.get_text(strip=True),
                                      "url": a_tag.get("href"),
                                      "snippet": content_tag.get_text(strip=True) if content_tag else ""
                                  }
                                  outfile.write(json.dumps(item, ensure_ascii=False) + "\n")
                                  total_new_results += 1
                              print("Got " + str(total_new_results) + " results for: " + query + " via " + instance)
                              time.sleep(2)
                              break
                      except Exception as e:
                          print("Failed " + instance + " for " + query + ": " + str(e))
                          continue

          whole_size = os.path.getsize(RESULTS_FILE)
          with open(RESULTS_FILE, "r", encoding="utf-8") as f:
              total_historical_results = sum(1 for _ in f)

          metadata = {
              "last_updated": datetime.now(timezone.utc).isoformat(),
              "number_of_results": total_historical_results,
              "whole_size_bytes": whole_size
          }
          with open(METADATA_FILE, "w", encoding="utf-8") as f:
              json.dump(metadata, f, indent=2)

          def format_size(size_bytes):
              for unit in ["B", "KB", "MB", "GB"]:
                  if size_bytes < 1024.0:
                      return str(round(size_bytes, 2)) + " " + unit
                  size_bytes = size_bytes / 1024.0
              return str(round(size_bytes, 2)) + " TB"

          with open(README_FILE, "r", encoding="utf-8") as f:
              text = f.read()

          updates = [
              ("Number of Results:", str(total_historical_results)),
              ("Time when updated:", metadata["last_updated"]),
              ("Whole size:", format_size(whole_size))
          ]
          for label, val in updates:
              pattern = "^" + re.escape(label) + ".*$"
              replacement = label + " " + val
              if re.search(pattern, text, flags=re.MULTILINE):
                  text = re.sub(pattern, replacement, text, flags=re.MULTILINE)
              else:
                  text = text.rstrip() + "\n" + replacement

          with open(README_FILE, "w", encoding="utf-8") as f:
              f.write(text + "\n")

          print("Authenticating with Internet Archive...")
          config = {
              "s3": {
                  "access": ia_access,
                  "secret": ia_secret
              }
          }
          session = get_session(config)
          item = session.get_item("ScrapeBin-Search")
          print("Uploading files...")
          item.upload(
              ["results.jsonl", "metadata.json"],
              metadata={"title": "ScrapeBin Search API", "mediatype": "data"}
          )
          print("Upload Successful!")

      - name: Commit and Push README changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update README stats automatically" && git push)

      - name: Delete generated files
        run: rm -f results.jsonl metadata.json
