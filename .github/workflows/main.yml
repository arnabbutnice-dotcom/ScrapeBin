name: SearXNG to IA Vault
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and Python
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tools
        run: |
          npm install rebrowser-puppeteer puppeteer-core
          # Downloads the specific Chrome binary needed for the runner
          npx puppeteer browsers install chrome
          pip install internetarchive

      - name: Run Scraper and Update Dashboard
        run: node index.js

      - name: Save readme.md Dashboard Changes
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Using lowercase to match your repository
          git add readme.md || echo "readme.md not found"
          git commit -m "Update ScrapeBin Stats" || echo "No changes to commit"
          git push

      - name: Upload to Internet Archive
        # This step only runs if index.js successfully created results.json
        env:
          IA_ACCESS: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET: ${{ secrets.IA_SECRET_KEY }}
        run: |
          ia configure --access-key="$IA_ACCESS" --secret-key="$IA_SECRET"
          # Target identifier for your 18GB project vault
          ia upload scrape-bin-vault-2026 ./results.json \
            --metadata="mediatype:texts" \
            --metadata="title:Automated SearXNG Results"
