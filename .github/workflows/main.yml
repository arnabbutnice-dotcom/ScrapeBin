name: SearXNG to IA Vault
on:
  workflow_dispatch:

permissions:
  contents: write # Crucial: Allows the action to edit your README

jobs:
  build_and_upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and Python
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tools
        run: |
          npm install rebrowser-puppeteer
          pip install internetarchive

      - name: Run Scraper and Update Dashboard
        run: node index.js

      - name: Save README Dashboard Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "Update ScrapeBin Stats" || echo "No changes to commit"
          git push

      - name: Upload to Internet Archive
        env:
          IA_ACCESS: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET: ${{ secrets.IA_SECRET_KEY }}
        run: |
          ia configure --access-key="$IA_ACCESS" --secret-key="$IA_SECRET"
          # Note: IA allows up to 18GB per file now. 
          ia upload scrape-bin-vault-2026 ./results.json \
            --metadata="mediatype:texts" \
            --metadata="title:Automated SearXNG Results"
