name: SearXNG to IA Vault
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tools
        run: |
          npm install rebrowser-puppeteer
          pip install internetarchive

      - name: Run Scraper
        run: node index.js
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome

      - name: Update readme.md
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add readme.md || echo "No readme found"
          git commit -m "Update stats" || echo "No changes"
          git push

      - name: IA Upload
        env:
          IA_ACCESS: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET: ${{ secrets.IA_SECRET_KEY }}
        run: |
          ia configure --access-key="$IA_ACCESS" --secret-key="$IA_SECRET"
          # Ready for your 18GB file project
          ia upload scrape-bin-vault-2026 ./results.json \
            --metadata="mediatype:texts" \
            --metadata="title:SearXNG Scrape Results" || echo "File already deleted or missing"
