name: SearXNG to IA Vault
on:
  workflow_dispatch: # This adds a "Run" button for you on mobile

jobs:
  build_and_upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and Python
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tools
        run: |
          npm install rebrowser-puppeteer
          pip install internetarchive

      - name: Run Stealth Scrape
        run: node index.js # This must match your scraper filename

      - name: Upload to Internet Archive
        env:
          IA_ACCESS: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET: ${{ secrets.IA_SECRET_KEY }}
        run: |
          ia configure --access-key="$IA_ACCESS" --secret-key="$IA_SECRET"
          # Replace 'my-unique-identifier-2026' with your own name
          ia upload my-search-vault-2026 ./results.json \
            --metadata="mediatype:texts" \
            --metadata="title:Automated SearXNG Results"
